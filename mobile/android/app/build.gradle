plugins {
    id "com.android.application"
}

android {
    namespace "dev.elrslang"
    compileSdk 35

    defaultConfig {
        applicationId "dev.elrslang"
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName "0.1.0"

        externalNativeBuild {
            cmake {
                cppFlags "-std=c++20 -Wall -Wextra"
            }
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
        }
    }
}
